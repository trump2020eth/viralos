name: CI / CD
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
env:
  NODE_VERSION: '20'
jobs:
  # ── Lint + Type Check ──────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run type-check
      - name: Lint
        run: npm run lint
  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_stub_for_ci
      CLERK_SECRET_KEY: sk_test_stub_for_ci
      GROQ_API_KEY: gsk_stub_for_ci
      NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: stub_anon_key
      SUPABASE_SERVICE_ROLE_KEY: stub_service_key
      NEXT_APP_URL: http://localhost:3000
      RENDER_WORKER_SECRET: stub_secret_32_chars_minimum_here
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build Next.js
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 7
